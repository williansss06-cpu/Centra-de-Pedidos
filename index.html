<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roteirizador Logístico</title>

<script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_AQUI&libraries=geometry,places&callback=initMap" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:20px;}
.container { max-width:1200px; margin:auto; background:white; padding:20px; border-radius:8px;}
.section { margin-bottom:25px; }
button { padding:8px 15px; background:#4CAF50; color:white; border:none; cursor:pointer;}
table { width:100%; border-collapse:collapse; margin-top:10px;}
th,td { border:1px solid #ddd; padding:8px;}
.map { height:500px; margin-top:20px;}
</style>
</head>

<body>
<div class="container">

<h1>Roteirizador Logístico</h1>

<!-- PEDIDOS -->
<div class="section">
<h2>Pedidos (CSV)</h2>
<input type="file" id="ordersFile">
<div id="ordersPreview"></div>
</div>

<!-- VEICULOS CSV -->
<div class="section">
<h2>Veículos (CSV)</h2>
<input type="file" id="vehiclesFile">
</div>

<!-- VEICULOS MANUAL -->
<div class="section">
<h2>Cadastro Manual de Veículos</h2>

<input id="veiculo_id" placeholder="Veículo">
<input id="cap_peso" type="number" placeholder="Peso kg">
<input id="cap_volume" type="number" placeholder="Volume m³">
<input id="max_notas" type="number" placeholder="Notas">

<button onclick="addVehicle()">Adicionar</button>

<table id="vehiclesTable">
<thead>
<tr>
<th>Veículo</th>
<th>Peso</th>
<th>Volume</th>
<th>Notas</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- CONFIG -->
<div class="section">
<h2>Configuração</h2>
<input id="depotAddress" value="São Paulo, SP" style="width:300px;">
<button id="planBtn">Calcular Rotas</button>
<div id="status"></div>
</div>

<div id="map" class="map"></div>
<div id="results"></div>

</div>

<script>

let ordersData = [];
let vehiclesData = [];
let geocoder, map;
let cache = {};
let renderers = [];

function initMap(){
    geocoder = new google.maps.Geocoder();
    map = new google.maps.Map(document.getElementById("map"),{
        center:{lat:-23.55,lng:-46.63},
        zoom:10
    });
}

// CSV pedidos
document.getElementById("ordersFile").addEventListener("change", e=>{
    Papa.parse(e.target.files[0], {
        header:true,
        complete:r=>{
            ordersData = r.data;
        }
    });
});

// CSV veículos
document.getElementById("vehiclesFile").addEventListener("change", e=>{
    Papa.parse(e.target.files[0], {
        header:true,
        complete:r=>{
            vehiclesData = r.data;
            renderVehicles();
        }
    });
});

// ADD VEICULO
function addVehicle(){
    vehiclesData.push({
        veiculo_id: veiculo_id.value,
        cap_peso_kg: parseFloat(cap_peso.value),
        cap_volume_m3: parseFloat(cap_volume.value),
        max_notas: parseInt(max_notas.value)
    });
    renderVehicles();
}

// RENDER VEICULOS
function renderVehicles(){
    let tbody = document.querySelector("#vehiclesTable tbody");
    tbody.innerHTML = "";
    vehiclesData.forEach((v,i)=>{
        tbody.innerHTML += `
        <tr>
            <td>${v.veiculo_id}</td>
            <td>${v.cap_peso_kg}</td>
            <td>${v.cap_volume_m3}</td>
            <td>${v.max_notas}</td>
            <td><button onclick="removeVehicle(${i})">X</button></td>
        </tr>`;
    });
}

function removeVehicle(i){
    vehiclesData.splice(i,1);
    renderVehicles();
}

// GEOCODE
function geo(addr){
    return new Promise((res,rej)=>{
        if(cache[addr]) return res(cache[addr]);

        geocoder.geocode({address:addr},(r,s)=>{
            if(s==="OK"){
                let loc = {lat:r[0].geometry.location.lat(),lng:r[0].geometry.location.lng()};
                cache[addr]=loc;
                res(loc);
            } else rej(s);
        });
    });
}

// PLANEJAMENTO SIMPLES
async function plan(){
    let depot = await geo(depotAddress.value);

    let routes = vehiclesData.map(v=>({
        vehicle:v,
        orders:[],
        peso:0,
        volume:0,
        notas:0
    }));

    for(let o of ordersData){
        for(let r of routes){
            if(r.peso + +o.peso_kg <= r.vehicle.cap_peso_kg){
                r.orders.push(o);
                r.peso += +o.peso_kg;
                break;
            }
        }
    }

    return {routes,depot};
}

// GOOGLE ROUTE
async function draw(routes,depot){

    renderers.forEach(r=>r.setMap(null));
    renderers=[];

    for(let r of routes){
        if(!r.orders.length) continue;

        let way = [];
        for(let o of r.orders){
            let c = await geo(o.endereco);
            way.push({location:c,stopover:true});
        }

        let service = new google.maps.DirectionsService();

        service.route({
            origin:depot,
            destination:depot,
            waypoints:way,
            optimizeWaypoints:true,
            travelMode:"DRIVING"
        },(res,status)=>{
            if(status==="OK"){
                let renderer = new google.maps.DirectionsRenderer({map:map});
                renderer.setDirections(res);
                renderers.push(renderer);
            }
        });
    }
}

// BOTAO
planBtn.onclick = async ()=>{
    status.innerHTML = "Calculando...";
    let {routes,depot} = await plan();
    await draw(routes,depot);
    status.innerHTML = "✔️ Pronto!";
};

</script>
</body>
</html>
